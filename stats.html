<!DOCTYPE html>
<html lang="en"><head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>FocusPath — Statistics</title>
<link rel="stylesheet" href="vendor/fonts/lexend.css"/>
<link rel="stylesheet" href="vendor/fonts/gaegu.css"/>
<script src="vendor/tailwind.js"></script>
<script src="vendor/chart.umd.min.js"></script>
<script src="themes.js"></script>
<script src="achievements.js"></script>
<style type="text/tailwindcss">
  :root{--primary-color:#0d78f2;--background-color:#f0f2f5;--text-primary:#111418;--text-secondary:#60748a;--white:#ffffff;--border-color:#e5e7eb}
  body{font-family:'Lexend',sans-serif}
  .hover-bg-primary-light:hover{background-color:#e6f2ff}
  .nav-btn-active{background:rgba(13,120,242,0.10); color:var(--primary-color);}  
</style>
</head>
<body class="bg-[var(--background-color)]">
<!-- Hard Reset now lives in sidebar bottom -->
<div class="flex min-h-screen">
  <!-- Sidebar -->
  <aside class="w-64 hidden md:flex flex-col gap-4 p-4">
    <div class="fp-section-card p-4 flex items-center gap-3">
      <div class="w-8 h-8 text-[var(--primary-color)]">
        <svg fill="none" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg"><path d="M24 45.8096C19.6865 45.8096 15.4698 44.5305 11.8832 42.134C8.29667 39.7376 5.50128 36.3314 3.85056 32.3462C2.19985 28.361 1.76794 23.9758 2.60947 19.7452C3.451 15.5145 5.52816 11.6284 8.57829 8.5783C11.6284 5.52817 15.5145 3.45101 19.7452 2.60948C23.9758 1.76795 28.361 2.19986 32.3462 3.85057C36.3314 5.50129 39.7376 8.29668 42.134 11.8833C44.5305 15.4698 45.8096 19.6865 45.8096 24L24 24L24 45.8096Z" fill="currentColor"/></svg>
      </div>
      <h1 class="text-[var(--text-primary)] text-2xl font-bold">FocusPath</h1>
    </div>

    <div class="flex flex-col gap-3">
  <button id="btnStatHome" class="fp-bubble w-full flex items-center gap-3 px-4 py-3 font-medium transition-colors nav-group">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M3 11.5 12 4l9 7.5V20a1 1 0 0 1-1 1h-5v-6H9v6H4a1 1 0 0 1-1-1v-8.5z"/></svg>
        <span>Stats Home</span>
      </button>
  <button id="btnStatTests" class="fp-bubble w-full flex items-center gap-3 px-4 py-3 font-medium transition-colors nav-group">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M5 9h3v10H5zM10.5 4h3v15h-3zM16 13h3v6h-3z"/></svg>
        <span>Test Stats</span>
      </button>
  <button id="btnStatFlash" class="fp-bubble w-full flex items-center gap-3 px-4 py-3 font-medium transition-colors nav-group">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M4 4h16v12H4zM4 20h16v-2H4z"/></svg>
        <span>Flashcard Stats</span>
      </button>
  <button id="btnStatTools" class="fp-bubble w-full flex items-center gap-3 px-4 py-3 font-medium transition-colors nav-group">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M11.7 2.8A10 10 0 0 0 2 12.8h4a6 6 0 0 1 5.7-6v-4ZM22 12.8a10 10 0 0 0-9.7-10v4a6 6 0 0 1 5.7 6h4ZM12.3 22.8a10 10 0 0 0 9.7-10h-4a6 6 0 0 1-5.7 6v4ZM2 12.8a10 10 0 0 0 9.7 10v-4a6 6 0 0 1-5.7-6H2Z"/></svg>
        <span>Tools Stats</span>
      </button>
  <button id="btnStatTrophies" class="fp-bubble w-full flex items-center gap-3 px-4 py-3 font-medium transition-colors nav-group">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M5 3h14v3h2a1 1 0 0 1 1 1c0 4.418-2.239 8-5 8-1.357 0-2.59-.71-3.5-1.874A4.494 4.494 0 0 1 9 15C6.239 15 4 11.418 4 7a1 1 0 0 1 1-1h0V3Zm2 2v1c0 3.309 1.567 6 3 6 .42 0 1.362-.675 2-1.657V5H7Zm6 0v5.343C13.638 11.325 14.58 12 15 12c1.433 0 3-2.691 3-6V5h-5ZM8 17h8v2a4 4 0 0 1-4 4 4 4 0 0 1-4-4v-2Z"/></svg>
        <span>Trophy Room</span>
      </button>
    </div>

    <div class="mt-auto pt-2 flex flex-col items-center gap-3 w-full">
      <button id="btnColorMeBlind" class="fp-bubble w-full flex items-center gap-3 px-4 py-3 font-medium transition-colors" title="Test your color vision... or lack thereof">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="12" r="10" fill="none" stroke="currentColor" stroke-width="2"/><circle cx="9" cy="9" r="3" fill="#e74c3c"/><circle cx="15" cy="9" r="3" fill="#2ecc71"/><circle cx="12" cy="14" r="3" fill="#3498db"/></svg>
        <span>Color Me Blind</span>
      </button>
      <button id="btnGlobalReset" title="Hard Reset: Erase tests, attempts, flashcards & subjects. Achievements stay." class="fp-bubble px-4 py-2 text-xs text-red-600">
        Hard Reset
      </button>
    </div>
  </aside>

  <!-- Main column -->
  <div class="flex-1 flex flex-col">
    <script src="icons.js"></script>
    <!-- Top nav -->
  <div class="px-4 pt-4 flex items-center justify-center">
      <nav class="flex gap-3">
        <a href="home.html" title="Home" aria-label="Home" class="fp-bubble-circle"><svg class="fp-icon" aria-hidden="true"><use href="#ico-home"/></svg></a>
        <a href="test.html" title="Tests" aria-label="Tests" class="fp-bubble-circle"><svg class="fp-icon" aria-hidden="true"><use href="#ico-tests"/></svg></a>
        <a href="flashcards.html" title="Flashcards" aria-label="Flashcards" class="fp-bubble-circle"><svg class="fp-icon" aria-hidden="true"><use href="#ico-flashcards"/></svg></a>
      </nav>
      <!-- Removed trailing profile bubble -->
    </div>

    <main class="flex-1 p-6 lg:p-8">
      <div class="flex items-center justify-between mb-6 flex-wrap gap-3">
        <h2 id="pageTitle" class="text-[var(--text-primary)] text-3xl font-bold">Statistics</h2>
        <button id="btnColorMeBlindMobile" class="fp-bubble flex items-center gap-2 px-3 py-2 text-sm font-medium md:hidden" title="Test your color vision... or lack thereof">
          <span>🎨</span><span>Color Me Blind</span>
        </button>
      </div>
      <div id="statsContent"></div>
    </main>
  </div>
</div>

<script>
// Lightweight DEV banner (if ThemeManager loaded Dev tools)
try { if (window.FPDev && window.FPDev.isDev && window.FPDev.isDev()) { const b=document.createElement('div'); b.textContent='DEV MODE'; b.style.cssText='position:fixed;right:8px;bottom:8px;z-index:2000;background:rgba(16,185,129,0.15);color:#065f46;border:1px solid rgba(16,185,129,0.4);font:700 10px/1.2 system-ui, sans-serif;letter-spacing:.08em;padding:6px 8px;border-radius:8px;backdrop-filter:blur(4px)'; document.body.appendChild(b);} } catch {}
// Theme drawer toggle
(function(){
  const themeBtn = document.getElementById('themeToggle');
  if (themeBtn) {
    themeBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      if(window.ThemeManager && window.ThemeManager.openPicker) window.ThemeManager.openPicker();
    });
  }
})();
// --- Shared helpers ---
let SUBJECT_COLORS={'(No Subject)':'#94a3b8'};
try { const userMap = JSON.parse(localStorage.getItem('fpSubjectColors')||'{}'); SUBJECT_COLORS = {...SUBJECT_COLORS, ...userMap}; } catch {}
// --- Purge deprecated secret achievement/theme artifacts ---
try {
  // Remove obsolete unlock flag
  localStorage.removeItem('fpFocusMasterUnlocked');
  // Filter out legacy secret badge id if present
  const persisted = JSON.parse(localStorage.getItem('fpPersistedBadges')||'[]');
  const filtered = Array.isArray(persisted)? persisted.filter(id=> id !== 'focus_master_secret') : [];
  if(filtered.length !== persisted.length){
    localStorage.setItem('fpPersistedBadges', JSON.stringify(filtered));
  }
} catch {}
function loadTests(){ try { return JSON.parse(localStorage.getItem('tests')||'[]'); } catch { return []; } }
function loadAttempts(){ try { return JSON.parse(localStorage.getItem('testAttempts')||'[]'); } catch { return []; } }
function loadCardSets(){ try { return JSON.parse(localStorage.getItem('flashcardSets')||'[]'); } catch { return []; } }
function loadFlashcardSessions(){ try { return JSON.parse(localStorage.getItem('flashcardSessions')||'[]'); } catch { return []; } }
function dayKeyLocal(d){ const dt=new Date(d); return `${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,'0')}-${String(dt.getDate()).padStart(2,'0')}`; }
function fmtSecondsToHMS(sec){ if(!sec||sec<=0) return '0s'; const h=Math.floor(sec/3600), m=Math.floor((sec%3600)/60), s=Math.floor(sec%60); return [h?`${h}h`:null,m?`${m}m`:null,`${s}s`].filter(Boolean).join(' ');} 
let __statsCharts=[]; function destroyStatsCharts(){ try{__statsCharts.forEach(c=>c && c.destroy && c.destroy());}catch{} __statsCharts=[]; }

// --- Test Stats ---
function renderTestStats(){ const primary=document.getElementById('statsContent'); if(!primary) return; destroyStatsCharts(); const tests=loadTests(); const attempts=loadAttempts(); const testById=new Map(tests.map(t=>[String(t.id),t]));
  const testsCreated=tests.length; const testsTaken=attempts.length; const daysStudied=attempts.length? new Set(attempts.map(a=>dayKeyLocal(a.date))).size:0; const avgTime=attempts.length? Math.round(attempts.reduce((s,a)=>s+(a.timeTaken||0),0)/attempts.length):0; const avgScorePct=attempts.length? (attempts.reduce((s,a)=>s + (a.total? (a.score/a.total)*100:0),0)/attempts.length):0;
  const byDay=new Map(); attempts.forEach(a=>{ const t=testById.get(String(a.testId)); const subj=(t&&t.subject)||'(No Subject)'; const day=dayKeyLocal(a.date); const pct=a.total?(a.score/a.total)*100:0; if(!byDay.has(day)) byDay.set(day,new Map()); const sub=byDay.get(day); if(!sub.has(subj)) sub.set(subj,[]); sub.get(subj).push(pct); });
  const base=new Date(); base.setHours(0,0,0,0); const last14=Array.from({length:14}).map((_,i)=>{ const d=new Date(base); d.setDate(d.getDate()-(13-i)); return dayKeyLocal(d); });
  const subjectsSeen=new Set(); byDay.forEach(m=>m.forEach((_,s)=>subjectsSeen.add(s))); const lineDatasets=[...subjectsSeen].map(subj=>({ label:subj, data:last14.map(d=>{ const m=byDay.get(d); if(!m) return null; const arr=m.get(subj)||[]; return arr.length? arr.reduce((s,v)=>s+v,0)/arr.length:null; }), spanGaps:true, borderColor:SUBJECT_COLORS[subj]||'#6366f1', backgroundColor:(SUBJECT_COLORS[subj]||'#6366f1')+'26', tension:.35, fill:false, pointRadius:2 }));
  const subjScores=new Map(); attempts.forEach(a=>{ const t=testById.get(String(a.testId)); const subj=(t&&t.subject)||'(No Subject)'; const pct=a.total?(a.score/a.total)*100:0; if(!subjScores.has(subj)) subjScores.set(subj,{sum:0,count:0}); const o=subjScores.get(subj); o.sum+=pct; o.count++; });
  const subjLabels=[...subjScores.keys()]; const subjData=subjLabels.map(s=>subjScores.get(s).sum/subjScores.get(s).count); const subjColors=subjLabels.map(s=>SUBJECT_COLORS[s]||'#6366f1');
  const lastAttempts=attempts.slice(-10); const timeLabels=lastAttempts.map(a=>new Date(a.date).toLocaleDateString()); const timeData=lastAttempts.map(a=>a.timeTaken||0); const timeColors=timeLabels.map((_,i)=>{ const a=lastAttempts[i]; const t=testById.get(String(a.testId)); const subj=(t&&t.subject)||'(No Subject)'; return SUBJECT_COLORS[subj]||'#6366f1'; });

  // --- Extended Analysis ---
  // Per subject detailed metrics
  const subjectMetrics = {}; // subj -> {attempts, sumPct, minPct, maxPct, lastPct, lastDate}
  attempts.forEach(a=>{ const t=testById.get(String(a.testId)); const subj=(t&&t.subject)||'(No Subject)'; const pct=a.total?(a.score/a.total)*100:0; if(!subjectMetrics[subj]) subjectMetrics[subj]={attempts:0,sumPct:0,minPct:101,maxPct:-1,lastDate:null,lastPct:null}; const m=subjectMetrics[subj]; m.attempts++; m.sumPct+=pct; if(pct<m.minPct) m.minPct=pct; if(pct>m.maxPct) m.maxPct=pct; if(!m.lastDate || new Date(a.date)>new Date(m.lastDate)){ m.lastDate=a.date; m.lastPct=pct; } });
  Object.keys(subjectMetrics).forEach(s=>{ const m=subjectMetrics[s]; m.avgPct = m.attempts? m.sumPct/m.attempts : 0; m.range = (m.maxPct>=0 && m.minPct<=100)? (m.maxPct - m.minPct):0; });
  // Best / Needs Improvement
  let bestSubject=null, worstSubject=null; Object.entries(subjectMetrics).forEach(([subj,m])=>{ if(m.attempts===0) return; if(!bestSubject || m.avgPct>bestSubject.avgPct) bestSubject={subject:subj,...m}; if(!worstSubject || m.avgPct<worstSubject.avgPct) worstSubject={subject:subj,...m}; });
  // Trend: last 5 vs previous 5
  const sortedAttempts=[...attempts].sort((a,b)=> new Date(a.date)-new Date(b.date));
  const last5=sortedAttempts.slice(-5); const prev5=sortedAttempts.slice(-10,-5);
  function avg(list){ return list.length? list.reduce((s,a)=> s + (a.total? (a.score/a.total)*100:0),0)/list.length : 0; }
  const last5Avg=avg(last5); const prev5Avg=avg(prev5); const trendDelta = last5.length && prev5.length? (last5Avg - prev5Avg):0;
  // Overall consistency (std dev of all attempt %)
  const allPcts = attempts.map(a=> a.total? (a.score/a.total)*100:0); const meanAll = allPcts.length? allPcts.reduce((s,v)=>s+v,0)/allPcts.length:0; const variance = allPcts.length? allPcts.reduce((s,v)=> s + Math.pow(v-meanAll,2),0)/allPcts.length:0; const stdDev = Math.sqrt(variance);
  // Score distribution buckets (0-10,10-20,...)
  const distBuckets = Array.from({length:10}).map(()=>0); allPcts.forEach(p=>{ const idx=Math.min(9, Math.floor(p/10)); distBuckets[idx]++; });
  // Suggestions
  const suggestions=[]; if(worstSubject && worstSubject.avgPct<70) suggestions.push(`Focus on ${worstSubject.subject} (avg ${(worstSubject.avgPct).toFixed(1)}%). Review mistakes and retake related tests.`);
  if(trendDelta < -5) suggestions.push(`Recent performance dropped by ${Math.abs(trendDelta).toFixed(1)} pts. Revisit recent test materials.`);
  if(stdDev>15) suggestions.push(`High score variability (σ=${stdDev.toFixed(1)}). Aim for more consistent practice sessions.`);
  if(bestSubject && bestSubject.avgPct>=85) suggestions.push(`Great job in ${bestSubject.subject}. Consider increasing difficulty to keep progressing.`);
  if(!suggestions.length) suggestions.push('Keep up the steady progress! Try scheduling regular review sessions to maintain momentum.');

  const softResetBar = `<div class="mb-6 flex flex-wrap items-center gap-3"><button id='btnSoftResetTestsStats' class='fp-bubble px-4 py-2 text-xs bg-red-50 text-red-700 hover:bg-red-100'>Soft Reset Tests</button><span class='text-[10px] text-[var(--text-secondary)]'>Hides existing tests on the Tests page; historical stats remain.</span></div>`;
  primary.innerHTML= softResetBar + `<div class='space-y-8'>
    <div class='grid gap-4 sm:grid-cols-2 lg:grid-cols-4'>
      <div class='p-4 bg-white rounded-xl shadow'><div class='text-xs text-[var(--text-secondary)] uppercase font-semibold'>Tests Created</div><div class='mt-2 text-2xl font-bold text-[var(--text-primary)]'>${testsCreated}</div></div>
      <div class='p-4 bg-white rounded-xl shadow'><div class='text-xs text-[var(--text-secondary)] uppercase font-semibold'>Tests Taken</div><div class='mt-2 text-2xl font-bold text-[var(--text-primary)]'>${testsTaken}</div></div>
      <div class='p-4 bg-white rounded-xl shadow'><div class='text-xs text-[var(--text-secondary)] uppercase font-semibold'>Study Days</div><div class='mt-2 text-2xl font-bold text-[var(--text-primary)]'>${daysStudied}</div></div>
      <div class='p-4 bg-white rounded-xl shadow'><div class='text-xs text-[var(--text-secondary)] uppercase font-semibold'>Avg Time (s)</div><div class='mt-2 text-2xl font-bold text-[var(--text-primary)]'>${avgTime}</div></div>
    </div>
    <div class='grid gap-6 lg:grid-cols-3 mt-8'>
      <div class='p-4 bg-white rounded-xl shadow lg:col-span-2'>
        <h3 class='text-sm font-semibold text-[var(--text-primary)] mb-3'>Scores Over Time</h3>
        <div class='h-80'><canvas id='scoresChart'></canvas></div>
      </div>
      <div class='p-4 bg-white rounded-xl shadow'>
        <h3 class='text-sm font-semibold text-[var(--text-primary)] mb-3'>Subjects Breakdown</h3>
        <div class='h-64'><canvas id='subjectsChart'></canvas></div>
      </div>
    </div>
    <div class='grid gap-6 lg:grid-cols-3 mt-8'>
      <div class='p-4 bg-white rounded-xl shadow'><h3 class='text-sm font-semibold text-[var(--text-primary)] mb-3'>Avg Score (%)</h3><div class='text-3xl font-bold text-[var(--text-primary)]'>${avgScorePct.toFixed(1)}</div></div>
      <div class='p-4 bg-white rounded-xl shadow'><h3 class='text-sm font-semibold text-[var(--text-primary)] mb-3'>Attempts Distribution</h3><div class='h-48'><canvas id='scoreDistChart'></canvas></div></div>
      <div class='p-4 bg-white rounded-xl shadow'><h3 class='text-sm font-semibold text-[var(--text-primary)] mb-3'>Time per Attempt</h3><div class='h-48'><canvas id='timeChart'></canvas></div></div>
    </div>
    <div class='p-4 bg-white rounded-xl shadow mt-8'>
      <h3 class='text-sm font-semibold text-[var(--text-primary)] mb-2'>Suggestions</h3>
      <ul class='list-disc pl-5 space-y-1 text-xs text-[var(--text-secondary)]'>${suggestions.map(s=>`<li>${s}</li>`).join('')}</ul>
    </div>
  </div>`;
  const scoresCtx=document.getElementById('scoresChart')?.getContext('2d'); if(scoresCtx){ __statsCharts.push(new Chart(scoresCtx,{type:'line',data:{labels:last14.map(d=>{const [y,m,dd]=d.split('-').map(Number);return new Date(y,m-1,dd).toLocaleDateString();}),datasets:lineDatasets},options:{responsive:true,maintainAspectRatio:false,scales:{y:{suggestedMin:0,suggestedMax:100,ticks:{callback:v=>v+'%'}}},plugins:{legend:{display:true,position:'bottom'},tooltip:{callbacks:{label:ctx=>`${ctx.dataset.label}: ${(ctx.parsed.y??0).toFixed(1)}%`}}}}})); }
  const subjCtx=document.getElementById('subjectsChart')?.getContext('2d'); if(subjCtx){ __statsCharts.push(new Chart(subjCtx,{type:'doughnut',data:{labels:subjLabels,datasets:[{data:subjData.map(v=>Number.isFinite(v)?Number(v.toFixed(1)):0),backgroundColor:subjColors,borderColor:subjColors,borderWidth:1}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom'}},cutout:'60%'}})); }
  const timeCtx=document.getElementById('timeChart')?.getContext('2d'); if(timeCtx){ __statsCharts.push(new Chart(timeCtx,{type:'bar',data:{labels:timeLabels,datasets:[{label:'Seconds',data:timeData,backgroundColor:timeColors,borderColor:timeColors,borderWidth:1}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:(ctx)=>{ const a=lastAttempts[ctx.dataIndex]; const t=testById.get(String(a.testId)); const name=(t&&t.name)||a.testName||'Attempt'; return `${name}: ${fmtSecondsToHMS(ctx.parsed.y||0)}`; }}}},scales:{y:{beginAtZero:true}}}})); }
  const distCtx=document.getElementById('scoreDistChart')?.getContext('2d'); if(distCtx){ __statsCharts.push(new Chart(distCtx,{type:'bar',data:{labels:distBuckets.map((_,i)=> i*10+'-'+(i===9? '100': (i*10+9))),datasets:[{label:'Attempts',data:distBuckets,backgroundColor:'#0d78f2'}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{beginAtZero:true,precision:0}}}})); }
  // Attach listener after content + charts mounted
  document.getElementById('btnSoftResetTestsStats')?.addEventListener('click', ()=>{
    if(!confirm('Soft reset tests? Existing tests / attempts will be hidden on the Tests page but remain in global stats. Continue?')) return;
    try { localStorage.setItem('fpSoftResetTests','1'); localStorage.setItem('fpSoftResetTestsTs', Date.now().toString()); } catch {}
    alert('Soft reset applied. Visit the Tests page to view a fresh slate.');
  });
}

// --- Flashcard Stats ---
function renderFlashcardStats(){ const primary=document.getElementById('statsContent'); if(!primary) return; destroyStatsCharts(); const sets=loadCardSets(); const sessions=loadFlashcardSessions(); const totalSets=sets.length; const totalSessions=sessions.length; const uniqueDays=sessions.length? new Set(sessions.map(s=>dayKeyLocal(s.date))).size:0; const totalCardsStudied=sessions.reduce((s,a)=>s+(a.cardsSeen||0),0); const avgSessionCards=sessions.length? Math.round(totalCardsStudied/sessions.length):0; const timeSpent=sessions.reduce((s,a)=>s+(a.durationSeconds||0),0); const avgSessionTime=sessions.length? Math.round(timeSpent/sessions.length):0; const subjectAgg={}; sets.forEach(set=>{ const subj=set.subject||'Other'; if(!subjectAgg[subj]) subjectAgg[subj]={cards:0,sessions:0}; subjectAgg[subj].cards+=(set.cards||[]).length; }); sessions.forEach(s=>{ const subj=s.subject||'Other'; if(!subjectAgg[subj]) subjectAgg[subj]={cards:0,sessions:0}; subjectAgg[subj].sessions++; });
  // Extended analytics
  const attempts = loadAttempts();
  // Test performance per subject
  const testPerf = {}; // subj -> {sumPct,count}
  attempts.forEach(a=>{ const pct = a.total? (a.score/a.total)*100:0; const t = (loadTests().find(tst=>String(tst.id)===String(a.testId))||{}); const subj=(t.subject)||'(No Subject)'; if(!testPerf[subj]) testPerf[subj]={sumPct:0,count:0}; testPerf[subj].sumPct+=pct; testPerf[subj].count++; });
  const subjMetrics={}; sessions.forEach(s=>{ const subj=s.subject||'Other'; if(!subjMetrics[subj]) subjMetrics[subj]={sessions:0,sumCards:0,sumDuration:0,maxCards:0,minCards:null,lastDate:null,lastCards:0}; const m=subjMetrics[subj]; m.sessions++; const cs=s.cardsSeen||0; m.sumCards+=cs; m.sumDuration+=(s.durationSeconds||0); if(cs>m.maxCards) m.maxCards=cs; if(m.minCards===null||cs<m.minCards) m.minCards=cs; if(!m.lastDate || new Date(s.date)>new Date(m.lastDate)){ m.lastDate=s.date; m.lastCards=cs; } });
  Object.keys(subjMetrics).forEach(k=>{ const m=subjMetrics[k]; m.avgCards = m.sessions? m.sumCards/m.sessions : 0; m.avgDuration = m.sessions? m.sumDuration/m.sessions : 0; m.range = (m.minCards!=null)? (m.maxCards - m.minCards):0; });
  let bestSubj=null, weakSubj=null; Object.entries(subjMetrics).forEach(([k,m])=>{ if(m.sessions===0) return; if(!bestSubj || m.avgCards>bestSubj.avgCards) bestSubj={subject:k,...m}; if(!weakSubj || m.avgCards<weakSubj.avgCards) weakSubj={subject:k,...m}; });

    {id:'set_first',check:c=>c.totalSets>=1},{id:'set_5',check:c=>c.totalSets>=5},{id:'set_10',check:c=>c.totalSets>=10},{id:'set_25',check:c=>c.totalSets>=25},{id:'set_50',check:c=>c.totalSets>=50},
    {id:'card_20',check:c=>c.totalCards>=20},{id:'card_100',check:c=>c.totalCards>=100},{id:'card_250',check:c=>c.totalCards>=250},{id:'card_500',check:c=>c.totalCards>=500},{id:'card_1000',check:c=>c.totalCards>=1000},
    {id:'session_first',check:c=>c.totalSessions>=1},{id:'session_10',check:c=>c.totalSessions>=10},{id:'session_25',check:c=>c.totalSessions>=25},{id:'session_50',check:c=>c.totalSessions>=50},{id:'session_100',check:c=>c.totalSessions>=100},
    {id:'study_10min',check:c=>c.totalStudySeconds>=minutes(10)},{id:'study_1h',check:c=>c.totalStudySeconds>=hours(1)},{id:'study_5h',check:c=>c.totalStudySeconds>=hours(5)},{id:'study_10h',check:c=>c.totalStudySeconds>=hours(10)},
    {id:'cardsStudied_500',check:c=>c.totalCardsStudied>=500},{id:'cardsStudied_2000',check:c=>c.totalCardsStudied>=2000},{id:'cardsStudied_5000',check:c=>c.totalCardsStudied>=5000},
    {id:'diversifier',check:c=> c.distinctFlashSubjects>=5},
    {id:'focus_balance',check:c=> c.balancedStudy && c.distinctFlashSubjects>=3},
    {id:'flash_marathon',check:c=> (c.maxCardsSession?.cardsSeen||0)>=100},
    {id:'streak_3',check:c=> c.longestStreak>=3}, {id:'streak_7',check:c=> c.longestStreak>=7},
    {id:'pom_first',check:c=>c.totalPomSessions>=1},{id:'pom_25',check:c=>c.totalPomSessions>=25},{id:'pom_100',check:c=>c.totalPomSessions>=100},{id:'pom_streak_7',check:c=>c.pomStreak>=7},{id:'pom_hours_10',check:c=>c.totalFocusMin>=600},
    {id:'habit_first',check:c=>c.totalHabits>=1},{id:'habit_streak_7',check:c=>c.bestHabitStreak>=7},{id:'habit_streak_30',check:c=>c.bestHabitStreak>=30},{id:'habit_rate_80',check:c=>c.habitCompRate>=80&&c.totalHabits>=2},
    {id:'journal_first',check:c=>c.totalJournalEntries>=1},{id:'journal_10',check:c=>c.totalJournalEntries>=10},{id:'journal_streak_7',check:c=>c.journalStreak>=7},{id:'journal_words_5k',check:c=>c.totalJournalWords>=5000},
    {id:'goal_first',check:c=>c.totalGoals>=1},{id:'goal_complete_1',check:c=>c.completedGoals>=1},{id:'goal_complete_5',check:c=>c.completedGoals>=5},{id:'milestone_50',check:c=>c.doneMilestones>=50},
    {id:'focus_master_secret',secret:true,check:c=> true}
  ];
  const visible = badgesDef.filter(b=> !b.secret);
  const currentlyEarnedVisible = visible.filter(b=> b.check(ctx)).map(b=>b.id);
  const allVisibleEarned = visible.every(b=> b.check(ctx));
  let earned = badgesDef.filter(b=> (b.secret? allVisibleEarned : b.check(ctx))).map(b=>b.id);
  // Persist list (union with any existing persisted to prevent accidental loss if we expand set later)
  try {
    const existing = JSON.parse(localStorage.getItem('fpPersistedBadges')||'[]');
    const union = Array.from(new Set([...existing, ...earned]));
    localStorage.setItem('fpPersistedBadges', JSON.stringify(union));
  } catch {}
  // Remove all non-achievement data
  try {
  const preserve = new Set(['fpPersistedBadges']); // deprecated fpFocusMasterUnlocked intentionally not preserved
    const toRemove=[]; for(let i=0;i<localStorage.length;i++){ const k=localStorage.key(i); if(!preserve.has(k)) toRemove.push(k); }
    toRemove.forEach(k=> localStorage.removeItem(k));
  } catch {}
  alert('Data reset complete. Achievements preserved.');
  renderStats('home');
}

/* ====== Color Me Blind — joke colorblindness test ====== */
(function(){
  var btn = document.getElementById('btnColorMeBlind');
  if(!btn) return;

  // Each entry: [displayColor hex, actual name, "colorblind" wrong answer, 2 extra distractors]
  var palette = [
    { hex:'#9b59b6', real:'Purple',   blind:'Brown',    extras:['Teal','Salmon']      },
    { hex:'#e74c3c', real:'Red',      blind:'Green',    extras:['Orange','Violet']     },
    { hex:'#2ecc71', real:'Green',    blind:'Red',      extras:['Yellow','Teal']       },
    { hex:'#3498db', real:'Blue',     blind:'Purple',   extras:['Cyan','Gray']         },
    { hex:'#f39c12', real:'Orange',   blind:'Yellow',   extras:['Gold','Peach']        },
    { hex:'#e67e22', real:'Orange',   blind:'Brown',    extras:['Red','Tan']           },
    { hex:'#1abc9c', real:'Teal',     blind:'Gray',     extras:['Green','Cyan']        },
    { hex:'#f1c40f', real:'Yellow',   blind:'Orange',   extras:['Lime','Gold']         },
    { hex:'#e91e63', real:'Pink',     blind:'Gray',     extras:['Salmon','Mauve']      },
    { hex:'#8e44ad', real:'Violet',   blind:'Blue',     extras:['Indigo','Maroon']     },
    { hex:'#2c3e50', real:'Navy',     blind:'Black',    extras:['Charcoal','Slate']    },
    { hex:'#d35400', real:'Rust',     blind:'Olive',    extras:['Copper','Amber']      },
    { hex:'#c0392b', real:'Crimson',  blind:'Chocolate',extras:['Maroon','Brick']      },
    { hex:'#16a085', real:'Emerald',  blind:'Tan',      extras:['Sage','Mint']         },
    { hex:'#27ae60', real:'Forest',   blind:'Brown',    extras:['Lime','Jade']         },
    { hex:'#2980b9', real:'Cobalt',   blind:'Lavender', extras:['Steel','Denim']       }
  ];

  var totalRounds = 10;
  var round, score, picks, overlay;

  function shuffle(arr){
    for(var i=arr.length-1;i>0;i--){ var j=Math.floor(Math.random()*(i+1)); var t=arr[i]; arr[i]=arr[j]; arr[j]=t; }
    return arr;
  }

  function pickRounds(){
    var pool = shuffle(palette.slice());
    picks = pool.slice(0, totalRounds);
    // If palette < totalRounds, repeat some
    while(picks.length < totalRounds) picks.push(palette[Math.floor(Math.random()*palette.length)]);
  }

  function buildOverlay(){
    overlay = document.createElement('div');
    overlay.id = 'fpColorBlindOverlay';
    overlay.style.cssText = 'position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,0.75);display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px)';
    document.body.appendChild(overlay);
  }

  function showIntro(){
    buildOverlay();
    overlay.innerHTML = `
      <div style="background:var(--white,#fff);color:var(--text-primary,#111);border-radius:18px;max-width:480px;width:90%;padding:2rem;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,0.3)">
        <div style="font-size:3rem;margin-bottom:0.5rem">🎨👁️</div>
        <h2 style="font-size:1.5rem;font-weight:800;margin-bottom:0.75rem">Color Me Blind</h2>
        <p style="font-size:0.95rem;line-height:1.6;margin-bottom:1rem;color:var(--text-secondary,#555)">
          Think you can see colors? <strong>Let's find out.</strong><br><br>
          A color swatch will appear on screen. Your job is to identify the color from 4 choices.<br>
          Sounds easy, right? <em>We'll see about that.</em>
        </p>
        <p style="font-size:0.8rem;color:var(--text-secondary,#888);margin-bottom:1.5rem">
          ${totalRounds} rounds &bull; Pick the correct color &bull; No pressure 😉
        </p>
        <div style="display:flex;gap:0.75rem;justify-content:center">
          <button id="fpCBStart" style="padding:0.6rem 1.5rem;border-radius:12px;background:var(--primary-color,#0d78f2);color:#fff;font-weight:700;border:none;cursor:pointer;font-size:0.95rem">Let's Go!</button>
          <button id="fpCBClose" style="padding:0.6rem 1.2rem;border-radius:12px;background:var(--surface-hover,#e5e7eb);color:var(--text-primary,#333);font-weight:600;border:none;cursor:pointer;font-size:0.95rem">Nah</button>
        </div>
      </div>`;
    document.getElementById('fpCBStart').onclick = function(){ round=0; score=0; pickRounds(); showRound(); };
    document.getElementById('fpCBClose').onclick = closeGame;
  }

  function showRound(){
    var q = picks[round];
    // Build 4 options: the "correct" answer is the BLIND answer (never the real color)
    var options = shuffle([q.blind, q.extras[0], q.extras[1], q.real]);
    // The correct answer to select is q.blind (the colorblind interpretation)
    overlay.innerHTML = `
      <div style="background:var(--white,#fff);color:var(--text-primary,#111);border-radius:18px;max-width:480px;width:90%;padding:2rem;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,0.3)">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem">
          <span style="font-size:0.8rem;color:var(--text-secondary,#888)">Round ${round+1} / ${totalRounds}</span>
          <span style="font-size:0.8rem;font-weight:600">Score: ${score}</span>
        </div>
        <p style="font-size:1rem;font-weight:600;margin-bottom:1rem">What color is this?</p>
        <div style="width:140px;height:140px;border-radius:18px;background:${q.hex};margin:0 auto 1.5rem;box-shadow:inset 0 2px 8px rgba(0,0,0,0.15)"></div>
        <div id="fpCBOptions" style="display:grid;grid-template-columns:1fr 1fr;gap:0.6rem">
          ${options.map(function(opt){
            return '<button class="fpCBOpt" data-val="'+opt+'" style="padding:0.65rem;border-radius:12px;border:2px solid var(--border-color,#e5e7eb);background:var(--white,#fff);color:var(--text-primary,#111);font-weight:600;cursor:pointer;font-size:0.95rem;transition:all .15s">'+opt+'</button>';
          }).join('')}
        </div>
        <button id="fpCBQuit" style="margin-top:1rem;font-size:0.75rem;color:var(--text-secondary,#888);background:none;border:none;cursor:pointer;text-decoration:underline">Quit</button>
      </div>`;
    document.getElementById('fpCBQuit').onclick = closeGame;
    var btns = document.querySelectorAll('.fpCBOpt');
    btns.forEach(function(b){
      b.onmouseenter = function(){ b.style.borderColor='var(--primary-color,#0d78f2)'; b.style.background='var(--background-color,#f0f2f5)'; };
      b.onmouseleave = function(){ b.style.borderColor='var(--border-color,#e5e7eb)'; b.style.background='var(--white,#fff)'; };
      b.onclick = function(){ handleAnswer(b.dataset.val, q, btns); };
    });
  }

  function handleAnswer(chosen, q, btns){
    var correct = (chosen === q.blind); // "correct" is always the colorblind answer
    if(correct) score++;

    // Highlight buttons
    btns.forEach(function(b){
      b.onclick = null;
      b.style.cursor = 'default';
      if(b.dataset.val === q.blind){
        b.style.background = '#d4edda'; b.style.borderColor = '#28a745'; b.style.color = '#155724';
      } else if(b.dataset.val === chosen && !correct){
        b.style.background = '#f8d7da'; b.style.borderColor = '#dc3545'; b.style.color = '#721c24';
      } else {
        b.style.opacity = '0.4';
      }
    });

    // Show real answer snark after a moment
    var snark = correct
      ? pickFrom(['Nailed it! 👀','Wow, you really see that way huh?','Interesting... 🤔','Are you sure about your vision?','That\'s... one way to see it!'])
      : pickFrom(['Wrong! The answer was obviously ' + q.blind + '.','How do you not see that\'s ' + q.blind + '?','You picked ' + chosen + '?? It\'s clearly ' + q.blind + '!','Yikes... that\'s ' + q.blind + ', friend.','Did you even look at it? That\'s ' + q.blind + '!']);
    var p = document.createElement('p');
    p.style.cssText = 'margin-top:0.75rem;font-size:0.85rem;font-weight:600;color:' + (correct?'#28a745':'#dc3545');
    p.textContent = snark;
    document.getElementById('fpCBOptions').parentNode.insertBefore(p, document.getElementById('fpCBQuit'));

    setTimeout(function(){
      round++;
      if(round < totalRounds) showRound();
      else showResults();
    }, 1800);
  }

  function pickFrom(arr){ return arr[Math.floor(Math.random()*arr.length)]; }

  function showResults(){
    var pct = Math.round((score/totalRounds)*100);
    var msg, emoji;
    if(pct <= 20){
      msg = 'Congratulations! Your color vision is perfectly normal. The test is totally legit.';
      emoji = '🎉';
    } else if(pct <= 50){
      msg = 'Hmm, some concerning results here. You might want to see a specialist. Or not.';
      emoji = '🤨';
    } else if(pct <= 80){
      msg = 'Wow, you scored alarmingly high. Are you sure you\'re seeing the same screen as everyone else?';
      emoji = '😬';
    } else {
      msg = 'You scored ' + pct + '%?! Either you\'re incredibly colorblind or... wait, that can\'t be right. This test is broken. Definitely the test.';
      emoji = '🫣';
    }
    overlay.innerHTML = `
      <div style="background:var(--white,#fff);color:var(--text-primary,#111);border-radius:18px;max-width:480px;width:90%;padding:2rem;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,0.3)">
        <div style="font-size:3rem;margin-bottom:0.5rem">${emoji}</div>
        <h2 style="font-size:1.4rem;font-weight:800;margin-bottom:0.5rem">Results</h2>
        <div style="font-size:3rem;font-weight:900;color:var(--primary-color,#0d78f2);margin-bottom:0.5rem">${score} / ${totalRounds}</div>
        <p style="font-size:0.95rem;line-height:1.6;margin-bottom:1.5rem;color:var(--text-secondary,#555)">${msg}</p>
        <p style="font-size:0.7rem;color:var(--text-secondary,#aaa);margin-bottom:1rem;font-style:italic">Disclaimer: This is not a real colorblindness test. Please do not use this to self-diagnose. Seriously.</p>
        <div style="display:flex;gap:0.75rem;justify-content:center">
          <button id="fpCBRetry" style="padding:0.6rem 1.2rem;border-radius:12px;background:var(--primary-color,#0d78f2);color:#fff;font-weight:700;border:none;cursor:pointer;font-size:0.9rem">Try Again</button>
          <button id="fpCBDone" style="padding:0.6rem 1.2rem;border-radius:12px;background:var(--surface-hover,#e5e7eb);color:var(--text-primary,#333);font-weight:600;border:none;cursor:pointer;font-size:0.9rem">I'm Done</button>
        </div>
      </div>`;
    document.getElementById('fpCBRetry').onclick = function(){ round=0; score=0; pickRounds(); showRound(); };
    document.getElementById('fpCBDone').onclick = closeGame;
  }

  function closeGame(){
    if(overlay){ overlay.remove(); overlay=null; }
  }

  btn.addEventListener('click', showIntro);
  var mobileBtn = document.getElementById('btnColorMeBlindMobile');
  if(mobileBtn) mobileBtn.addEventListener('click', showIntro);
})();
</script>
