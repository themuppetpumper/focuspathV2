<!DOCTYPE html>
<html lang="en"><head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>FocusPath — Cornell Notes</title>
<link rel="stylesheet" href="vendor/fonts/lexend.css"/>
<link rel="stylesheet" href="vendor/fonts/gaegu.css"/>
<script src="vendor/tailwind.js"></script>
<script src="themes.js"></script>
<script src="achievements.js"></script>
<style type="text/tailwindcss">
  :root{--primary-color:#0d78f2;--background-color:#f0f2f5;--text-primary:#111418;--text-secondary:#60748a;--white:#ffffff;--border-color:#e5e7eb}
  body{font-family:'Lexend',sans-serif}
  .cornell-grid{display:grid;grid-template-columns:220px 1fr;grid-template-rows:auto 1fr auto;min-height:500px;border:2px solid var(--border-color);border-radius:12px;overflow:hidden;background:var(--white)}
  .cornell-header{grid-column:1/3;padding:12px 16px;border-bottom:2px solid var(--border-color);background:var(--background-color)}
  .cornell-cue{border-right:2px solid var(--border-color);padding:12px}
  .cornell-notes{padding:12px}
  .cornell-summary{grid-column:1/3;border-top:2px solid var(--border-color);padding:12px}
  textarea.cornell-field{width:100%;height:100%;border:none;resize:none;background:transparent;font-family:'Lexend',sans-serif;font-size:14px;color:var(--text-primary);outline:none;line-height:1.6}
  @media(max-width:768px){.cornell-grid{grid-template-columns:1fr;grid-template-rows:auto auto auto auto}.cornell-cue{border-right:none;border-bottom:2px solid var(--border-color)}}
</style>
</head>
<body class="bg-[var(--background-color)]">
<div class="flex min-h-screen">
  <aside class="w-64 hidden md:flex flex-col gap-4 p-4">
    <div class="fp-section-card p-4 flex items-center gap-3">
      <div class="w-8 h-8 text-[var(--primary-color)]">
        <svg fill="none" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg"><path d="M24 45.8096C19.6865 45.8096 15.4698 44.5305 11.8832 42.134C8.29667 39.7376 5.50128 36.3314 3.85056 32.3462C2.19985 28.361 1.76794 23.9758 2.60947 19.7452C3.451 15.5145 5.52816 11.6284 8.57829 8.5783C11.6284 5.52817 15.5145 3.45101 19.7452 2.60948C23.9758 1.76795 28.361 2.19986 32.3462 3.85057C36.3314 5.50129 39.7376 8.29668 42.134 11.8833C44.5305 15.4698 45.8096 19.6865 45.8096 24L24 24L24 45.8096Z" fill="currentColor"/></svg>
      </div>
      <h1 class="text-[var(--text-primary)] text-2xl font-bold">FocusPath</h1>
    </div>
    <div class="flex flex-col gap-3">
      <button id="btnNewNote" class="fp-bubble-primary w-full flex items-center gap-3 px-4 py-3 font-medium">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M12 4v16m8-8H4" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/></svg>
        <span>New Note</span>
      </button>
    </div>
    <div class="fp-section-card p-4">
      <h4 class="text-[var(--text-secondary)] text-xs font-semibold uppercase mb-2">Your Notes</h4>
      <div id="notesList" class="flex flex-col gap-1 max-h-[60vh] overflow-auto"></div>
    </div>
    <div class="mt-auto pt-2"></div>
  </aside>

  <div class="flex-1 flex flex-col">
    <script src="icons.js"></script>
    <div class="px-4 pt-4 flex items-center justify-center">
      <nav class="flex gap-3">
        <a href="home.html" title="Home" class="fp-bubble-circle"><svg class="fp-icon"><use href="#ico-home"/></svg></a>
        <a href="flashcards.html" title="Flashcards" class="fp-bubble-circle"><svg class="fp-icon"><use href="#ico-flashcards"/></svg></a>
        <a href="test.html" title="Tests" class="fp-bubble-circle"><svg class="fp-icon"><use href="#ico-tests"/></svg></a>
        <a href="stats.html" title="Stats" class="fp-bubble-circle"><svg class="fp-icon"><use href="#ico-stats"/></svg></a>
      </nav>
    </div>

    <main class="flex-1 p-6 lg:p-8">
      <div class="flex items-center justify-between mb-6 flex-wrap gap-3">
        <h2 class="text-[var(--text-primary)] text-3xl font-bold">Cornell Notes</h2>
        <div class="flex gap-2">
          <button id="btnNewNoteMobile" class="fp-bubble-primary flex items-center gap-2 px-4 py-2 text-sm font-medium md:hidden">+ New Note</button>
          <button id="btnDeleteNote" class="fp-bubble px-3 py-2 text-sm text-red-500 hidden">🗑 Delete</button>
        </div>
      </div>

      <!-- Empty state -->
      <div id="emptyState" class="text-center py-20 hidden">
        <div class="text-5xl mb-4">📝</div>
        <h3 class="text-[var(--text-primary)] text-xl font-semibold mb-2">No notes yet</h3>
        <p class="text-[var(--text-secondary)] text-sm mb-4">The Cornell method splits notes into cues, main notes, and a summary —<br>proven to boost comprehension and review.</p>
        <button onclick="document.getElementById('btnNewNote').click()" class="fp-bubble-primary px-6 py-2 font-medium">Create Your First Note</button>
      </div>

      <!-- Cornell editor -->
      <div id="noteEditor" class="hidden">
        <div class="cornell-grid">
          <div class="cornell-header flex items-center gap-3">
            <input id="noteTitle" type="text" maxlength="100" placeholder="Note Title — Subject / Topic" class="flex-1 bg-transparent text-[var(--text-primary)] font-bold text-lg outline-none"/>
            <span id="noteDate" class="text-[var(--text-secondary)] text-xs flex-shrink-0"></span>
          </div>
          <div class="cornell-cue">
            <div class="text-[var(--text-secondary)] text-xs font-semibold uppercase mb-2">Cue Column</div>
            <textarea id="noteCue" class="cornell-field" placeholder="Key questions, terms, and cues...&#10;&#10;Write these AFTER your notes.&#10;Use them to quiz yourself."></textarea>
          </div>
          <div class="cornell-notes">
            <div class="text-[var(--text-secondary)] text-xs font-semibold uppercase mb-2">Main Notes</div>
            <textarea id="noteBody" class="cornell-field" style="min-height:300px" placeholder="Record notes here during class or study...&#10;&#10;• Use abbreviations&#10;• Skip lines between ideas&#10;• Use your own words"></textarea>
          </div>
          <div class="cornell-summary">
            <div class="text-[var(--text-secondary)] text-xs font-semibold uppercase mb-2">Summary</div>
            <textarea id="noteSummary" class="cornell-field" style="min-height:80px" placeholder="After class: summarize this page in 2-3 sentences in your own words..."></textarea>
          </div>
        </div>
        <div class="flex items-center justify-between mt-3 text-xs text-[var(--text-secondary)]">
          <span id="autoSaveStatus">Auto-saved</span>
          <span id="wordCount">0 words</span>
        </div>
      </div>
    </main>
  </div>
</div>

<script>
(function(){
  const STORE = 'fpCornell';
  function load(){ try { return JSON.parse(localStorage.getItem(STORE)||'[]'); } catch { return []; } }
  function save(n){ localStorage.setItem(STORE, JSON.stringify(n)); }

  const notesList = document.getElementById('notesList');
  const editor = document.getElementById('noteEditor');
  const emptyState = document.getElementById('emptyState');
  const delBtn = document.getElementById('btnDeleteNote');
  let activeId = null;
  let saveTimer = null;

  const fields = {
    title: document.getElementById('noteTitle'),
    cue: document.getElementById('noteCue'),
    body: document.getElementById('noteBody'),
    summary: document.getElementById('noteSummary')
  };

  function createNote(){
    const notes = load();
    const note = {
      id: 'cn_'+Date.now(),
      title: '',
      cue: '',
      body: '',
      summary: '',
      created: Date.now(),
      updated: Date.now()
    };
    notes.unshift(note);
    save(notes);
    openNote(note.id);
    renderList();
    fields.title.focus();
  }

  function openNote(id){
    const notes = load();
    const note = notes.find(n=>n.id===id);
    if(!note) return;
    activeId = id;
    fields.title.value = note.title;
    fields.cue.value = note.cue;
    fields.body.value = note.body;
    fields.summary.value = note.summary;
    document.getElementById('noteDate').textContent = new Date(note.created).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
    updateWordCount();
    emptyState.classList.add('hidden');
    editor.classList.remove('hidden');
    delBtn.classList.remove('hidden');
    renderList();
  }

  function autoSave(){
    if(!activeId) return;
    clearTimeout(saveTimer);
    document.getElementById('autoSaveStatus').textContent = 'Saving...';
    saveTimer = setTimeout(() => {
      const notes = load();
      const note = notes.find(n=>n.id===activeId);
      if(!note) return;
      note.title = fields.title.value;
      note.cue = fields.cue.value;
      note.body = fields.body.value;
      note.summary = fields.summary.value;
      note.updated = Date.now();
      save(notes);
      document.getElementById('autoSaveStatus').textContent = 'Auto-saved';
      renderList();
    }, 500);
  }

  function updateWordCount(){
    const total = [fields.cue.value, fields.body.value, fields.summary.value].join(' ').split(/\s+/).filter(w=>w).length;
    document.getElementById('wordCount').textContent = total + ' word'+(total!==1?'s':'');
  }

  Object.values(fields).forEach(f => {
    f.addEventListener('input', () => { autoSave(); updateWordCount(); });
  });

  document.getElementById('btnNewNote').addEventListener('click', createNote);
  document.getElementById('btnNewNoteMobile').addEventListener('click', createNote);

  delBtn.addEventListener('click', () => {
    if(!activeId || !confirm('Delete this note?')) return;
    save(load().filter(n=>n.id!==activeId));
    activeId = null;
    editor.classList.add('hidden');
    delBtn.classList.add('hidden');
    render();
  });

  function renderList(){
    const notes = load();
    notesList.innerHTML = '';
    notes.forEach(n => {
      const el = document.createElement('div');
      const isActive = n.id === activeId;
      el.className = 'text-sm cursor-pointer px-2 py-1.5 rounded-lg transition-colors flex items-center gap-2 '+(isActive?'bg-[var(--primary-color)] bg-opacity-10':'hover:bg-[var(--background-color)]');
      el.style.borderLeft = isActive ? '3px solid var(--primary-color)' : '3px solid transparent';
      const title = n.title || 'Untitled Note';
      const date = new Date(n.updated).toLocaleDateString('en-US',{month:'short',day:'numeric'});
      el.innerHTML = `<span class="flex-1 truncate text-[var(--text-primary)]">${esc(title)}</span><span class="text-[var(--text-secondary)] text-xs flex-shrink-0">${date}</span>`;
      el.addEventListener('click', () => openNote(n.id));
      notesList.appendChild(el);
    });
  }

  function render(){
    const notes = load();
    renderList();
    if(!notes.length){
      emptyState.classList.remove('hidden');
      editor.classList.add('hidden');
      delBtn.classList.add('hidden');
    } else if(!activeId){
      // Open the first note
      openNote(notes[0].id);
    }
  }

  function esc(s){ const d=document.createElement('div'); d.textContent=s; return d.innerHTML; }

  render();
})();
</script>
<script src="tools-drawer.js"></script>
</body></html>
