<!DOCTYPE html>
<html lang="en"><head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>FocusPath — Goals</title>
<link rel="stylesheet" href="vendor/fonts/lexend.css"/>
<link rel="stylesheet" href="vendor/fonts/gaegu.css"/>
<script src="vendor/tailwind.js"></script>
<script src="themes.js"></script>
<script src="achievements.js"></script>
<style type="text/tailwindcss">
  :root{--primary-color:#0d78f2;--background-color:#f0f2f5;--text-primary:#111418;--text-secondary:#60748a;--white:#ffffff;--border-color:#e5e7eb}
  body{font-family:'Lexend',sans-serif}
</style>
</head>
<body class="bg-[var(--background-color)]">
<div class="flex min-h-screen">
  <aside class="w-64 hidden md:flex flex-col gap-4 p-4">
    <div class="fp-section-card p-4 flex items-center gap-3">
      <div class="w-8 h-8 text-[var(--primary-color)]">
        <svg fill="none" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg"><path d="M24 45.8096C19.6865 45.8096 15.4698 44.5305 11.8832 42.134C8.29667 39.7376 5.50128 36.3314 3.85056 32.3462C2.19985 28.361 1.76794 23.9758 2.60947 19.7452C3.451 15.5145 5.52816 11.6284 8.57829 8.5783C11.6284 5.52817 15.5145 3.45101 19.7452 2.60948C23.9758 1.76795 28.361 2.19986 32.3462 3.85057C36.3314 5.50129 39.7376 8.29668 42.134 11.8833C44.5305 15.4698 45.8096 19.6865 45.8096 24L24 24L24 45.8096Z" fill="currentColor"/></svg>
      </div>
      <h1 class="text-[var(--text-primary)] text-2xl font-bold">FocusPath</h1>
    </div>
    <div class="flex flex-col gap-3">
      <button id="btnAddGoal" class="fp-bubble-primary w-full flex items-center gap-3 px-4 py-3 font-medium">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M12 4v16m8-8H4" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" fill="none"/></svg>
        <span>New Goal</span>
      </button>
    </div>
    <div class="fp-section-card p-4">
      <h4 class="text-[var(--text-secondary)] text-xs font-semibold uppercase mb-2">Your Goals</h4>
      <div id="goalList" class="flex flex-col gap-2 max-h-[55vh] overflow-auto"></div>
    </div>
    <div class="mt-auto pt-2"></div>
  </aside>

  <div class="flex-1 flex flex-col">
    <script src="icons.js"></script>
    <div class="px-4 pt-4 flex items-center justify-center">
      <nav class="flex gap-3">
        <a href="home.html" title="Home" class="fp-bubble-circle"><svg class="fp-icon"><use href="#ico-home"/></svg></a>
        <a href="flashcards.html" title="Flashcards" class="fp-bubble-circle"><svg class="fp-icon"><use href="#ico-flashcards"/></svg></a>
        <a href="test.html" title="Tests" class="fp-bubble-circle"><svg class="fp-icon"><use href="#ico-tests"/></svg></a>
        <a href="stats.html" title="Stats" class="fp-bubble-circle"><svg class="fp-icon"><use href="#ico-stats"/></svg></a>
      </nav>
    </div>

    <main class="flex-1 p-6 lg:p-8">
      <div class="flex items-center justify-between mb-6 flex-wrap gap-3">
        <h2 class="text-[var(--text-primary)] text-3xl font-bold">Goal Tracker</h2>
        <button id="btnAddGoalMobile" class="fp-bubble-primary flex items-center gap-2 px-4 py-2 text-sm font-medium md:hidden">+ New Goal</button>
      </div>
      <div id="goalContent"></div>
    </main>
  </div>
</div>

<!-- Goal Form Modal -->
<div id="goalModal" class="fixed inset-0 z-50 bg-black/40 flex items-center justify-center" style="display:none">
  <div class="bg-[var(--white)] rounded-2xl shadow-2xl p-6 w-full max-w-lg relative" style="border:1px solid var(--border-color);">
    <button id="goalModalClose" class="absolute top-3 right-3 text-[var(--text-secondary)] hover:text-[var(--text-primary)] text-xl">&times;</button>
    <h3 class="text-[var(--text-primary)] text-lg font-bold mb-4" id="goalModalTitle">New Goal</h3>
    <form id="goalForm" class="space-y-4">
      <div>
        <label class="block text-sm font-medium text-[var(--text-primary)] mb-1">Goal Title *</label>
        <input id="gfTitle" type="text" required maxlength="100" class="w-full rounded-lg border border-[var(--border-color)] bg-[var(--white)] text-[var(--text-primary)] px-3 py-2 text-sm" placeholder="e.g. Pass advancement exam"/>
      </div>
      <div class="grid grid-cols-2 gap-3">
        <div>
          <label class="block text-sm font-medium text-[var(--text-primary)] mb-1">Target Date</label>
          <input id="gfDeadline" type="date" class="w-full rounded-lg border border-[var(--border-color)] bg-[var(--white)] text-[var(--text-primary)] px-3 py-2 text-sm"/>
        </div>
        <div>
          <label class="block text-sm font-medium text-[var(--text-primary)] mb-1">Category</label>
          <select id="gfCategory" class="w-full rounded-lg border border-[var(--border-color)] bg-[var(--white)] text-[var(--text-primary)] px-3 py-2 text-sm">
            <option value="study">Study</option>
            <option value="fitness">Fitness</option>
            <option value="career">Career</option>
            <option value="personal">Personal</option>
          </select>
        </div>
      </div>
      <div>
        <label class="block text-sm font-medium text-[var(--text-primary)] mb-1">Description</label>
        <textarea id="gfDesc" rows="2" maxlength="300" class="w-full rounded-lg border border-[var(--border-color)] bg-[var(--white)] text-[var(--text-primary)] px-3 py-2 text-sm" placeholder="What does success look like?"></textarea>
      </div>
      <div>
        <label class="block text-sm font-medium text-[var(--text-primary)] mb-1">Milestones</label>
        <div id="milestoneList" class="space-y-2 mb-2"></div>
        <button type="button" id="btnAddMilestone" class="text-[var(--primary-color)] text-sm font-medium hover:underline">+ Add Milestone</button>
      </div>
      <div class="flex gap-3 pt-2">
        <button type="submit" class="fp-bubble-primary px-6 py-2 font-medium flex-1">Save Goal</button>
        <button type="button" id="btnCancelGoal" class="fp-bubble px-4 py-2 font-medium">Cancel</button>
      </div>
    </form>
  </div>
</div>

<script>
(function(){
  const STORE = 'fpGoals';
  function load(){ try { return JSON.parse(localStorage.getItem(STORE)||'[]'); } catch { return []; } }
  function save(g){ localStorage.setItem(STORE, JSON.stringify(g)); }

  const content = document.getElementById('goalContent');
  const modal = document.getElementById('goalModal');
  const form = document.getElementById('goalForm');
  const milestoneList = document.getElementById('milestoneList');
  let editingId = null;

  function showModal(goal){
    editingId = goal ? goal.id : null;
    document.getElementById('goalModalTitle').textContent = goal ? 'Edit Goal' : 'New Goal';
    document.getElementById('gfTitle').value = goal?.title || '';
    document.getElementById('gfDeadline').value = goal?.deadline || '';
    document.getElementById('gfCategory').value = goal?.category || 'study';
    document.getElementById('gfDesc').value = goal?.desc || '';
    milestoneList.innerHTML = '';
    (goal?.milestones || []).forEach(m => addMilestoneRow(m.text, m.done));
    modal.style.display = '';
    document.getElementById('gfTitle').focus();
  }
  function hideModal(){ modal.style.display = 'none'; editingId = null; }

  function addMilestoneRow(text, done){
    const row = document.createElement('div');
    row.className = 'flex items-center gap-2';
    row.innerHTML = `<input type="text" value="${(text||'').replace(/"/g,'&quot;')}" maxlength="100" class="flex-1 rounded border border-[var(--border-color)] bg-[var(--white)] text-[var(--text-primary)] px-2 py-1 text-sm" placeholder="Milestone description"/>
      <button type="button" class="text-red-400 hover:text-red-600 text-lg leading-none" title="Remove">&times;</button>`;
    row.querySelector('button').addEventListener('click', () => row.remove());
    milestoneList.appendChild(row);
  }

  document.getElementById('btnAddMilestone').addEventListener('click', () => addMilestoneRow('', false));
  document.getElementById('btnAddGoal').addEventListener('click', () => showModal(null));
  document.getElementById('btnAddGoalMobile').addEventListener('click', () => showModal(null));
  document.getElementById('goalModalClose').addEventListener('click', hideModal);
  document.getElementById('btnCancelGoal').addEventListener('click', hideModal);
  modal.addEventListener('click', e => { if(e.target === modal) hideModal(); });

  form.addEventListener('submit', e => {
    e.preventDefault();
    const goals = load();
    const milestones = [...milestoneList.querySelectorAll('input[type=text]')].map(el => ({text:el.value.trim(), done:false})).filter(m=>m.text);
    const data = {
      id: editingId || 'goal_'+Date.now(),
      title: document.getElementById('gfTitle').value.trim(),
      deadline: document.getElementById('gfDeadline').value,
      category: document.getElementById('gfCategory').value,
      desc: document.getElementById('gfDesc').value.trim(),
      milestones,
      created: editingId ? (goals.find(g=>g.id===editingId)?.created || Date.now()) : Date.now(),
      completed: false
    };
    if(!data.title) return;
    if(editingId){
      const idx = goals.findIndex(g=>g.id===editingId);
      if(idx>=0){ data.milestones = data.milestones.map((m,i) => ({...m, done: goals[idx].milestones?.[i]?.done || false})); goals[idx]={...goals[idx],...data}; }
    } else { goals.unshift(data); }
    save(goals);
    hideModal();
    render();
  });

  const catColors = { study:'#3b82f6', fitness:'#22c55e', career:'#f59e0b', personal:'#a855f7' };
  const catIcons = { study:'📚', fitness:'💪', career:'🎯', personal:'⭐' };

  function render(){
    const goals = load();
    // Sidebar list
    const sideList = document.getElementById('goalList');
    sideList.innerHTML = '';
    goals.forEach(g => {
      const el = document.createElement('div');
      el.className = 'text-sm cursor-pointer px-2 py-1.5 rounded-lg hover:bg-[var(--background-color)] transition-colors flex items-center gap-2';
      el.style.borderLeft = '3px solid '+(catColors[g.category]||'#94a3b8');
      const done = g.milestones?.length ? g.milestones.filter(m=>m.done).length : 0;
      const total = g.milestones?.length || 0;
      el.innerHTML = `<span class="flex-1 truncate text-[var(--text-primary)]">${esc(g.title)}</span>${total?'<span class="text-[var(--text-secondary)] text-xs">'+done+'/'+total+'</span>':''}`;
      el.addEventListener('click', () => scrollToGoal(g.id));
      sideList.appendChild(el);
    });

    // Main content
    if(!goals.length){
      content.innerHTML = `<div class="text-center py-20">
        <div class="text-5xl mb-4">🎯</div>
        <h3 class="text-[var(--text-primary)] text-xl font-semibold mb-2">No goals yet</h3>
        <p class="text-[var(--text-secondary)] text-sm mb-4">Set your first SMART goal to start tracking progress.</p>
        <button onclick="document.getElementById('btnAddGoal').click()" class="fp-bubble-primary px-6 py-2 font-medium">Create a Goal</button>
      </div>`;
      return;
    }

    content.innerHTML = '';
    goals.forEach(g => {
      const done = g.milestones?.filter(m=>m.done).length || 0;
      const total = g.milestones?.length || 0;
      const pct = total ? Math.round(done/total*100) : (g.completed ? 100 : 0);
      const daysLeft = g.deadline ? Math.ceil((new Date(g.deadline+'T23:59:59')-new Date())/(86400000)) : null;

      const card = document.createElement('div');
      card.id = 'goal-'+g.id;
      card.className = 'bg-[var(--white)] rounded-xl shadow-lg p-5 mb-4';
      card.style.borderLeft = '4px solid '+(catColors[g.category]||'#94a3b8');

      card.innerHTML = `
        <div class="flex items-start justify-between gap-3 mb-3">
          <div class="flex-1 min-w-0">
            <div class="flex items-center gap-2 mb-1">
              <span class="text-lg">${catIcons[g.category]||'📌'}</span>
              <h3 class="text-[var(--text-primary)] text-lg font-bold truncate">${esc(g.title)}</h3>
            </div>
            ${g.desc ? '<p class="text-[var(--text-secondary)] text-sm">'+esc(g.desc)+'</p>' : ''}
          </div>
          <div class="flex gap-1 flex-shrink-0">
            <button data-edit="${g.id}" class="fp-bubble px-2 py-1 text-xs" title="Edit">✏️</button>
            <button data-del="${g.id}" class="fp-bubble px-2 py-1 text-xs text-red-500" title="Delete">🗑</button>
          </div>
        </div>
        <div class="flex items-center gap-4 mb-3 text-sm">
          ${g.deadline?'<span class="text-[var(--text-secondary)] flex items-center gap-1">📅 '+g.deadline+(daysLeft!==null?' <span class="'+(daysLeft<0?'text-red-500':daysLeft<=7?'text-amber-500':'text-[var(--text-secondary)]')+' font-medium">'+(daysLeft<0?Math.abs(daysLeft)+'d overdue':daysLeft===0?'Today':daysLeft+'d left')+'</span>':'')+'</span>':''}
          <span class="text-[var(--primary-color)] font-semibold">${pct}% complete</span>
        </div>
        <div class="w-full h-2.5 bg-[var(--background-color)] rounded-full mb-3 overflow-hidden">
          <div class="h-full rounded-full transition-all" style="width:${pct}%;background:${catColors[g.category]||'var(--primary-color)'}"></div>
        </div>
        ${total ? '<div class="space-y-1.5" data-milestones="'+g.id+'"></div>' : ''}
      `;

      // Milestones
      if(total){
        const mWrap = card.querySelector('[data-milestones]');
        g.milestones.forEach((m,i) => {
          const row = document.createElement('label');
          row.className = 'flex items-center gap-2 cursor-pointer text-sm py-1 px-2 rounded hover:bg-[var(--background-color)] transition-colors';
          row.innerHTML = `<input type="checkbox" ${m.done?'checked':''} data-goal="${g.id}" data-mi="${i}" class="accent-[var(--primary-color)] w-4 h-4"/>
            <span class="${m.done?'line-through text-[var(--text-secondary)]':'text-[var(--text-primary)]'}">${esc(m.text)}</span>`;
          mWrap.appendChild(row);
        });
      }

      content.appendChild(card);

      // Wire edit/delete
      card.querySelector('[data-edit]').addEventListener('click', () => { showModal(g); });
      card.querySelector('[data-del]').addEventListener('click', () => {
        if(!confirm('Delete goal "'+g.title+'"?')) return;
        const goals = load().filter(x=>x.id!==g.id);
        save(goals); render();
      });
    });

    // Wire milestone checkboxes
    content.querySelectorAll('input[data-goal]').forEach(cb => {
      cb.addEventListener('change', () => {
        const goals = load();
        const g = goals.find(x=>x.id===cb.dataset.goal);
        if(g && g.milestones[cb.dataset.mi]) {
          g.milestones[cb.dataset.mi].done = cb.checked;
          save(goals); render();
        }
      });
    });
  }

  function scrollToGoal(id){
    const el = document.getElementById('goal-'+id);
    if(el) el.scrollIntoView({behavior:'smooth', block:'center'});
  }

  function esc(s){ const d=document.createElement('div'); d.textContent=s; return d.innerHTML; }

  render();
})();
</script>
<script src="tools-drawer.js"></script>
</body></html>
